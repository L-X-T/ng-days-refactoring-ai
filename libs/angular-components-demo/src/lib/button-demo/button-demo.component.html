<main class="content">
  <h1>Button</h1>

  <!-- +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ -->
  <div class="container">
    <h2>Primary</h2>

    <div class="card showcase">
      <div class="item">
        <h3>Default</h3>
        <button buttonType="primary" lxt-button>
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Disabled</h3>
        <button buttonType="primary" disabled lxt-button>
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Icon & Text</h3>
        <button buttonType="primary" lxt-button>
          <i class="icon i-lxt-check"></i>
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Icon</h3>
        <button buttonType="primary" lxt-button [iconOnly]="true">
          <i class="icon i-lxt-check"></i>
          <span class="label">Primary</span>
        </button>
      </div>
    </div>

    <div class="card showcase">
      <div class="item">
        <h3>Destructive</h3>
        <button buttonType="primary" lxt-button [destructive]="true">
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Disabled</h3>
        <button buttonType="primary" disabled lxt-button [destructive]="true">
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Icon & Text</h3>
        <button buttonType="primary" lxt-button [destructive]="true">
          <i class="icon i-lxt-cancel"></i>
          <span class="label">Primary</span>
        </button>
      </div>

      <div class="item">
        <h3>Icon</h3>
        <button buttonType="primary" lxt-button [destructive]="true" [iconOnly]="true">
          <i class="icon i-lxt-cancel"></i>
          <span class="label">Primary</span>
        </button>
      </div>
    </div>
  </div>
